<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Website intent dashboard</title>
<style>
  :root{color-scheme:dark light}
  body{font:13px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;margin:0;padding:22px;background:#0b0e14;color:#e6e6e6}
  h1{font-size:18px;margin:0 0 2px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#7fb2ff;margin:26px 0 6px}
  .sub{color:#8a93a6;font-size:12px;margin-bottom:8px;max-width:820px}
  table{border-collapse:collapse;margin-bottom:6px;max-width:900px}
  th,td{text-align:left;padding:6px 11px;border-bottom:1px solid #1e2530;white-space:nowrap}
  th{color:#8a93a6;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  td.big{font-size:18px;font-weight:700}
  td.zero{color:#3a4353}
  .tag{font-size:11px;padding:1px 6px;border-radius:4px;background:#1e2530;color:#9aa4b6}
  .lead{color:#5fd08a;font-weight:600}
  .note{color:#8a93a6;font-size:12px;max-width:820px;margin-top:4px}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
  select,button{background:#161b24;color:#e6e6e6;border:1px solid #2a3342;border-radius:6px;padding:5px 9px;font:inherit;cursor:pointer}
  label{color:#8a93a6;font-size:12px}
  #err{color:#ff8080;margin:6px 0}
  details.msel{position:relative;display:inline-block}
  details.msel>summary{list-style:none;cursor:pointer;background:#161b24;border:1px solid #2a3342;border-radius:6px;padding:5px 9px;color:#e6e6e6;font-size:13px;user-select:none}
  details.msel>summary::-webkit-details-marker{display:none}
  details.msel[open]>summary{border-color:#7fb2ff}
  details.msel>.panel{position:absolute;z-index:10;top:110%;left:0;background:#11151d;border:1px solid #2a3342;border-radius:8px;padding:8px 10px;min-width:170px;max-height:260px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  details.msel label.opt{display:flex;gap:7px;align-items:center;font-size:12px;color:#c9d2e0;padding:3px 0;cursor:pointer;white-space:nowrap}
  details.msel .clear{font-size:11px;color:#7fb2ff;cursor:pointer;padding:2px 0 4px;display:block}
  #meta{color:#8a93a6;font-size:11px}
  .person{color:#8fd0ff}.company{color:#c9a227}
</style>
</head>
<body>
<h1>Website intent dashboard</h1>
<div class="bar">
  <label>Range
    <select id="range">
      <option value="1">Today (24h)</option>
      <option value="7" selected>7 days</option>
      <option value="30">30 days</option>
      <option value="365">Since IP-fix</option>
    </select>
  </label>
  <label>Timezone
    <select id="tz">
      <option value="America/Los_Angeles" selected>PST</option>
      <option value="GMT">GMT</option>
      <option value="UTC">UTC</option>
    </select>
  </label>
  <button id="refresh">Refresh</button>
  <span id="meta"></span>
</div>
<div class="sub">Data starts at the IP-capture-fix epoch — earlier IP-based results were garbage and were purged.</div>
<div id="err"></div>
<div id="root"></div>

<script>
// Pure DOM render — no innerHTML.
const PROVIDERS = ['vector','rb2b','knock2','leadpipe','snitcher','leadfeeder','albacross'];
const N = (v) => (v==null ? '—' : String(v));

function el(tag, opts, kids){
  const e=document.createElement(tag);
  if(opts){ if(opts.text!=null) e.textContent=String(opts.text); if(opts.cls) e.className=opts.cls; }
  (kids||[]).forEach(k=>e.appendChild(k));
  return e;
}
function makeTable(headers, rows){
  const t=el('table'), hr=el('tr');
  headers.forEach((h,i)=>hr.appendChild(el('th',{text:(h&&h.text!=null)?h.text:h, cls:((h&&h.num)||i>0&&!(h&&h.num===false))?'num':''})));
  t.appendChild(hr);
  rows.forEach(r=>{ const tr=el('tr');
    r.forEach((c,i)=>{ const cell=(c&&typeof c==='object')?c:{text:c};
      const cl=[]; if(cell.num||(i>0&&cell.num!==false)) cl.push('num'); if(cell.big) cl.push('big');
      if((cell.text===0||cell.text==='0')&&cell.dimZero!==false) cl.push('zero'); if(cell.cls) cl.push(cell.cls);
      tr.appendChild(el('td',{text:cell.text,cls:cl.join(' ')})); });
    t.appendChild(tr); });
  return t;
}
function section(title, sub){
  const f=document.createDocumentFragment();
  f.appendChild(el('h2',{text:title}));
  if(sub) f.appendChild(el('div',{text:sub,cls:'sub'}));
  return f;
}

let lastData=null, lastVisits=[], lastRange='7', lastTz='UTC';
const matrixFilters={ip_class:new Set(), snitcher_type:new Set(), leadfeeder_type:new Set(), snitcher:new Set()};
let openFilter=null; // which dropdown stays open across re-renders

async function load(){
  const err=document.getElementById('err'); err.textContent='';
  const range=document.getElementById('range').value, tz=document.getElementById('tz').value;
  try{
    const [res, vres]=await Promise.all([
      fetch(`/v1/dashboard-data?days=${range}&tz=${encodeURIComponent(tz)}`,{headers:{accept:'application/json'}}),
      fetch(`/v1/dashboard-data?report=visits&days=${range}&tz=${encodeURIComponent(tz)}`,{headers:{accept:'application/json'}}),
    ]);
    if(!res.ok) throw new Error('HTTP '+res.status);
    lastData=await res.json(); lastVisits=vres.ok ? (await vres.json()).rows||[] : []; lastRange=range; lastTz=tz;
    render(lastData, lastVisits, range, tz);
  }catch(e){ err.textContent='Failed to load: '+e.message; }
}

// Matrix filter row: one CHECKBOX DROPDOWN per dimension — pick any number
// of values (OR within a filter, AND across filters). '(blank)' matches
// empty cells. Options come from the loaded rows' distinct values.
// Answers that are NOT matches (verdict words) — shared by the snitcher-column
// filter and the per-day summary. Mirrors the EF's NON_MATCH_CELLS.
const NON_MATCH=new Set(['no_match','no_session','pending','isp','educational','government','shared_network','already_known','skipped_bot','enriched_other_visit']);
// A real match looks like a domain/URL (has a dot) or a person name (has a
// space); verdict words are single dot-less tokens. The heuristic backstops
// the set when a vendor invents a new verdict (Snitcher's 'government').
const isMatchCell=(v)=>{ if(v==null) return false; const s=String(v); return s!==''&&!NON_MATCH.has(s)&&/[. ]/.test(s); };

function multiSelect(field, label, options){
  const set=matrixFilters[field];
  const det=document.createElement('details'); det.className='msel';
  if(openFilter===field) det.open=true;
  det.addEventListener('toggle',()=>{ openFilter=det.open?field:(openFilter===field?null:openFilter); });
  const sum=document.createElement('summary');
  sum.textContent=set.size?`${label} (${set.size})`:label;
  det.appendChild(sum);
  const panel=el('div',{cls:'panel'});
  const clear=el('span',{text:'clear',cls:'clear'});
  clear.onclick=()=>{ set.clear(); rerender(); };
  panel.appendChild(clear);
  options.forEach(([val,txt])=>{
    const lab=el('label',{cls:'opt'});
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=set.has(val);
    cb.onchange=()=>{ cb.checked?set.add(val):set.delete(val); rerender(); };
    lab.appendChild(cb); lab.appendChild(document.createTextNode(txt));
    panel.appendChild(lab);
  });
  det.appendChild(panel);
  return det;
}
function rerender(){ if(lastData) render(lastData,lastVisits,lastRange,lastTz); }

function classOptions(field, rows){
  return [...new Set(rows.map(r=>r[field]||''))].sort().map(v=>[v||'__blank', v||'(blank)']);
}
function snitcherOptions(rows){
  const verdicts=[...new Set(rows.map(r=>r.snitcher||'').filter(v=>v&&!isMatchCell(v)))].sort();
  return [['__matched','(matched)'],...verdicts.map(v=>[v,v]),['__blank','(blank)']];
}

function bucketOf(field, r){
  if(field==='snitcher'){
    const have=r.snitcher||'';
    if(have==='') return '__blank';
    return isMatchCell(have)?'__matched':have;
  }
  return (r[field]||'')||'__blank';
}
function matrixFilterPass(r){
  for(const f of ['ip_class','snitcher_type','leadfeeder_type','snitcher']){
    const set=matrixFilters[f];
    if(!set.size) continue;
    if(!set.has(bucketOf(f,r))) return false;
  }
  return true;
}

// Compact cell values for the matrix: bare domain as-is, LinkedIn URLs by
// their /in/<slug>, 'no_match' as a dim ×, absent as blank.
function cellVal(v){
  if(v==null||v==='') return {text:'',num:false};
  if(v==='no_match') return {text:'×',num:false,cls:'zero'};
  // Anything that is an answer but not a match renders as a dim word —
  // shares isMatchCell's rule so new vendor verdicts dim automatically.
  if(!isMatchCell(v)) return {text:String(v),num:false,cls:'zero'};
  const m=String(v).match(/linkedin\.com\/in\/([^\/?#]+)/i);
  return {text:m?m[1]:String(v),num:false};
}

function render(d, visits, range, tz){
  document.getElementById('meta').textContent =
    'window '+String(d.from||'').slice(0,10)+' → '+String(d.to||'').slice(0,10)+' · '+(d.tz||'')+' · generated '+String(d.generated_at||'').slice(11,19)+' UTC';
  const root=document.getElementById('root'); root.textContent='';

  // 0. PER-VISIT MATRIX (human visits × providers) + CSV export
  const VCOLS=['snitcher','albacross','leadfeeder','rb2b','vector','knock2','leadpipe'];
  const PCOLS=['rb2b_p','vector_p','knock2_p','leadpipe_p'];
  root.appendChild(section('Per-visit matrix — every provider answer per human visit',
    '"Human" = our user-agent classifier (bots faking real browsers pass it — check IP class). IP class = free rDNS/ASN verdict; snit/lf type = Snitcher business|isp / Leadfeeder company|shared_network for that IP. The snitcher column carries the full verdict: domain = identified business; isp/educational = classified non-business; pending = session received, not yet enriched; no_session = Radar never saw this visitor (strong bot tell). × = answered with no match; blank = never asked. Time on site = seconds between first and last pageview.'));
  const dl=el('a',{text:'⬇ Download CSV (full)',cls:'tag'});
  dl.href=`/v1/dashboard-data?report=visits&days=${range}&tz=${encodeURIComponent(tz)}&format=csv`;
  dl.style.textDecoration='none';
  const fbar=el('div',{cls:'bar'});
  fbar.appendChild(multiSelect('ip_class','IP class',classOptions('ip_class',visits)));
  fbar.appendChild(multiSelect('snitcher_type','Snit type',classOptions('snitcher_type',visits)));
  fbar.appendChild(multiSelect('leadfeeder_type','LF type',classOptions('leadfeeder_type',visits)));
  fbar.appendChild(multiSelect('snitcher','Snitcher',snitcherOptions(visits)));
  fbar.appendChild(dl);
  root.appendChild(fbar);
  const shown=visits.filter(matrixFilterPass);
  if(shown.length!==visits.length) root.appendChild(el('div',{cls:'note',text:`Filters match ${shown.length} of ${visits.length} visits.`}));
  visits=shown;
  if(visits.length){
    root.appendChild(makeTable(
      [{text:'Time',num:false},{text:'IP',num:false},{text:'IP class',num:false},{text:'Snit type',num:false},{text:'LF type',num:false},
       {text:'Pages'},{text:'Time on site, s'},
       ...VCOLS.map(c=>({text:c,num:false})), ...PCOLS.map(c=>({text:c,num:false}))],
      visits.slice(0,100).map(v=>[
        {text:String(v.timecode||'').slice(5,16).replace('T',' '),num:false},
        {text:v.ip||'',num:false},
        {text:v.ip_class||'',num:false,cls:(v.ip_class==='hosting'||v.ip_class==='bot')?'zero':''},
        {text:v.snitcher_type||'',num:false},
        {text:(v.leadfeeder_type==='shared_network'?'shared':v.leadfeeder_type)||'',num:false},
        {text:v.pageviews??''},{text:v.dwell_seconds??''},
        ...VCOLS.map(c=>cellVal(v[c])), ...PCOLS.map(c=>cellVal(v[c])),
      ])));
    if(visits.length>100) root.appendChild(el('div',{cls:'note',text:`Showing 100 of ${visits.length} visits — CSV has all rows.`}));
  } else root.appendChild(el('div',{cls:'note',text:'No human visits in this window.'}));

  // 0b. PER-DAY SUMMARY over the (filtered) matrix rows: visits + match
  // counts per provider per day. Verdict words and no_match are answers,
  // not matches (same rule as the EF's ?report=daily).
  root.appendChild(section('Per-day summary — visits and matches','Computed from the matrix rows above, so the filters apply here too. A match = a real domain/person in the cell (verdict words and × do not count).'));
  {
    const dayOf=(iso)=>new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(iso));
    const ALLCOLS=[...VCOLS,...PCOLS];
    const byDay=new Map();
    visits.forEach(v=>{
      const day=dayOf(v.timecode);
      const agg=byDay.get(day)||Object.fromEntries([['visits',0],...ALLCOLS.map(c=>[c,0])]);
      agg.visits++;
      ALLCOLS.forEach(c=>{ if(isMatchCell(v[c])) agg[c]++; });
      byDay.set(day,agg);
    });
    const days2=[...byDay.keys()].sort().reverse();
    if(days2.length){
      const tot=Object.fromEntries([['visits',0],...ALLCOLS.map(c=>[c,0])]);
      const rows2=days2.map(day=>{
        const a=byDay.get(day);
        tot.visits+=a.visits; ALLCOLS.forEach(c=>tot[c]+=a[c]);
        return [{text:day,num:false},{text:a.visits,big:true},...ALLCOLS.map(c=>({text:a[c]}))];
      });
      rows2.push([{text:'TOTAL',num:false,cls:'lead'},{text:tot.visits,cls:'lead'},...ALLCOLS.map(c=>({text:tot[c],cls:'lead'}))]);
      root.appendChild(makeTable([{text:'Day',num:false},{text:'Visits'},...ALLCOLS.map(c=>({text:c}))],rows2));
    } else root.appendChild(el('div',{cls:'note',text:'No visits match the current filters.'}));
  }

  // 1. DAILY ACTIVITY (days × providers, identifications)
  const daily=d.daily||[]; const cell={}; daily.forEach(r=>cell[r.day+'|'+r.provider]=r.n);
  const days=[...new Set(daily.map(r=>r.day))].sort().reverse();
  root.appendChild(section('Daily activity — identifications per provider','One distinct identity written per provider, per day (selected timezone). Company + person layers.'));
  if(days.length){
    const colTot={}; PROVIDERS.forEach(p=>colTot[p]=0);
    const rows=days.map(day=>{
      let dayTot=0;
      const cells=PROVIDERS.map(p=>{ const v=cell[day+'|'+p]||0; colTot[p]+=v; dayTot+=v; return {text:v||0}; });
      return [{text:day,num:false}, ...cells, {text:dayTot,big:true}];
    });
    rows.push([{text:'TOTAL',num:false,cls:'lead'}, ...PROVIDERS.map(p=>({text:colTot[p],cls:'lead'})), {text:PROVIDERS.reduce((a,p)=>a+colTot[p],0),cls:'lead'}]);
    root.appendChild(makeTable([{text:'Day',num:false}, ...PROVIDERS.map(p=>({text:p})), {text:'Total'}], rows));
  } else root.appendChild(el('div',{cls:'note',text:'No identifications in this window.'}));

  // 2. PROVIDER FUNNEL
  root.appendChild(section('Provider funnel — why each number is what it is','Input → calls → billed (200-with-data) → matched. A 0 usually means no input, not failure. Pixel providers push (no calls we make).'));
  const fp=d.funnel_person||[], fc=d.funnel_company||[];
  const P=(arr,name)=>arr.find(x=>x.provider===name)||{};
  root.appendChild(el('div',{cls:'sub',text:'Person providers'}));
  root.appendChild(makeTable([{text:'Provider',num:false},{text:'Calls'},{text:'Billed'},{text:'People'}],
    ['vector','rb2b','knock2','leadpipe'].map(p=>{const r=P(fp,p);return [{text:p,num:false},N(r.calls),N(r.billed),{text:r.people??0,big:true}];})));
  root.appendChild(el('div',{cls:'sub',text:'Company providers (all universal — no US limit)'}));
  root.appendChild(makeTable([{text:'Provider',num:false},{text:'Calls'},{text:'Billed'},{text:'Companies'},{text:'Match %'}],
    ['snitcher','leadfeeder','rb2b','albacross'].map(p=>{const r=P(fc,p);const calls=r.calls||0,m=r.matched||0;
      return [{text:p,num:false},{text:calls||0},N(r.billed),{text:m,big:true},{text:calls?Math.round(100*m/calls)+'%':'—',num:true}];})));

  // 3. OUR TRAFFIC + RECONCILIATION
  const our=d.our||{}, snit=d.snitcher||{}, pl=d.providers_live||{};
  const vecPeople=(P(fp,'vector').people)||0;
  root.appendChild(section('Our traffic + provider reconciliation','Our human visitors vs each provider’s own count (different metrics/windows, labeled). Convergence = our tracking is sound.'));
  root.appendChild(makeTable([{text:'Source',num:false},{text:'Count'},{text:'Metric',num:false}],[
    [{text:'Us — human visitors',cls:'lead',num:false},{text:our.total??0,big:true},{text:`US ${N(our.us)} · non-US ${N(our.non_us)} · unknown ${N(our.unknown)}`,num:false}],
    [{text:'Snitcher (Radar)',num:false},{text:N(snit.sessions_since)},{text:'sessions received · this window',num:false}],
    [{text:'Knock2',num:false},{text:N(pl.knock2_visitors_7d)},{text:'their visitor_count · fixed 7d',num:false}],
    [{text:'Leadpipe',num:false},{text:N(pl.leadpipe_identified_total)},{text:'identified · all-time',num:false}],
    [{text:'Vector',num:false},{text:vecPeople},{text:'identifications only',num:false}],
  ]));

  // 4. IDENTITY FEED
  const feed=d.feed||[];
  root.appendChild(section('Identity feed — who we actually identified','Most recent resolved entities (person or company), newest first.'));
  if(feed.length){
    root.appendChild(makeTable([{text:'Time',num:false},{text:'Type',num:false},{text:'Who',num:false},{text:'Company',num:false},{text:'Provider',num:false}],
      feed.slice(0,30).map(f=>[{text:f.t,num:false},{text:f.layer,num:false,cls:f.layer},{text:f.who,num:false},{text:f.layer==='company'?'':(f.company||''),num:false},{text:f.provider,num:false}])));
  } else root.appendChild(el('div',{cls:'note',text:'No identities in this window.'}));

  // 5. CROSS-PROVIDER CONFIDENCE
  const conf=d.confidence||[], top=d.confidence_top||[];
  const cf=(k)=>conf.find(c=>c.kind===k)||{cross_confirmed:0,single_source:0};
  root.appendChild(section('Cross-provider confidence — agreement, not IP heuristics','Entity = distinct person (email/LinkedIn) or company (domain). Cross-confirmed = 2+ INDEPENDENT providers found the SAME entity. This is ground truth.'));
  root.appendChild(makeTable([{text:'Entity',num:false},{text:'Cross-confirmed (2+)'},{text:'Single-source (1)'}],[
    [{text:'Person',num:false},{text:cf('person').cross_confirmed,big:true},N(cf('person').single_source)],
    [{text:'Company',num:false},{text:cf('company').cross_confirmed,big:true},N(cf('company').single_source)],
  ]));
  if(top.length) root.appendChild(makeTable([{text:'Confirmed entity',num:false},{text:'Confirmed by',num:false}],
    top.map(t=>[{text:t.label,num:false},{text:(t.providers||[]).join(' + '),num:false}])));
  else root.appendChild(el('div',{cls:'note',text:'No entity yet confirmed by 2+ independent providers — at this volume the providers are ADDITIVE (each catches different people), so agreement-based truth needs more traffic. A single resolved named person is the strongest signal; IP heuristics are NOT a substitute (they false-positive real corporate-cloud humans).'}));
}

document.getElementById('refresh').onclick=load;
document.getElementById('range').onchange=load;
document.getElementById('tz').onchange=load;
load();
setInterval(load,120000);
</script>
</body>
</html>
